<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none">
  <!-- Mug body -->
  <rect x="2" y="14" width="30" height="24" rx="3" stroke="white" stroke-width="2.5" fill="none"/>
  <!-- Mug base bar -->
  <rect x="0" y="36" width="34" height="3" rx="1.5" fill="white" opacity="0.5"/>
  <!-- Handle arc -->
  <path d="M32 20 Q44 20 44 28 Q44 36 32 36" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Steam wisps -->
  <path d="M10 10 Q8 6 10 2"  stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <path d="M18 10 Q16 6 18 2" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <path d="M26 10 Q24 6 26 2" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <!-- Separator -->
  <rect x="54" y="8" width="1" height="32" rx="0.5" fill="white" opacity="0.18"/>
  <!-- Wordmark — two lines -->
  <text x="64" y="22"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    font-size="14" font-weight="800" fill="white" letter-spacing="1.5">KETTLE</text>
  <text x="64" y="38"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    font-size="11" font-weight="500" fill="white" opacity="0.7" letter-spacing="3">&amp; KIN</text>
</svg>
