<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 48" fill="none">
  <!-- Leaf shape: upright teardrop with vein -->
  <path d="M20 44 C20 44 4 34 4 18 C4 8 11 2 20 2 C29 2 36 8 36 18 C36 34 20 44 20 44 Z"
    fill="white" opacity="0.92"/>
  <!-- Central vein -->
  <line x1="20" y1="42" x2="20" y2="6" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <!-- Side veins -->
  <line x1="20" y1="18" x2="10" y2="14" stroke="#0a0a0a" stroke-width="1" stroke-linecap="round" opacity="0.18"/>
  <line x1="20" y1="24" x2="30" y2="20" stroke="#0a0a0a" stroke-width="1" stroke-linecap="round" opacity="0.18"/>
  <line x1="20" y1="30" x2="11" y2="27" stroke="#0a0a0a" stroke-width="1" stroke-linecap="round" opacity="0.18"/>
  <!-- Separator -->
  <rect x="46" y="8" width="1" height="32" rx="0.5" fill="white" opacity="0.18"/>
  <!-- Wordmark -->
  <text x="56" y="22"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    font-size="16" font-weight="800" fill="white" letter-spacing="2.5">VERDE</text>
  <text x="56" y="38"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    font-size="10" font-weight="500" fill="white" opacity="0.65" letter-spacing="3.5">LIVING</text>
</svg>
